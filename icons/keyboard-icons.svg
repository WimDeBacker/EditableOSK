      <path d="M12 3l9 5-9 5-9-5 9-5Z"></path>
      <path d="M3 13l9 5 9-5"></path>
      <path d="M3 18l9 5 9-5"></path>
    </g>
    
    </symbol>
  <symbol id="i-font" viewBox="0 0 24 24">
    <!-- a stylized A with serif baseline + a small 'a' to imply font family -->
    <g data-fill="outline" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 19L8.5 5l5.5 14"></path>
      <path d="M5 14h7"></path>
      <path d="M16.5 19h5"></path>
      <path d="M19 19V9"></path>
      <path d="M16.5 9h5"></path>
    </g>
    
    </symbol>
  <symbol id="i-language" viewBox="0 0 24 24">
    <!-- globe with meridian + equator -->
    <g data-fill="outline" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="9"></circle>
      <path d="M3 12h18"></path>
      <path d="M12 3a13 13 0 0 1 0 18"></path>
      <path d="M12 3a13 13 0 0 0 0 18"></path>
    </g>
    
    </symbol>
  <symbol id="i-window" viewBox="0 0 24 24">
    <!-- app window with titlebar -->
    <g data-fill="outline" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="4" width="18" height="16" rx="2"></rect>
      <path d="M3 9h18"></path>
      <circle cx="6" cy="6.5" r=".6" fill="currentColor"></circle>
      <circle cx="8.4" cy="6.5" r=".6" fill="currentColor"></circle>
      <circle cx="10.8" cy="6.5" r=".6" fill="currentColor"></circle>
    </g>
    
    </symbol>
  <symbol id="i-accessibility" viewBox="0 0 24 24">
    <!-- universal accessibility figure (head + outstretched limbs in circle) -->
    <g data-fill="outline" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="9"></circle>
      <circle cx="12" cy="6.6" r="1.4" fill="currentColor"></circle>
      <path d="M6.5 9.5c2 .7 3.7 1 5.5 1s3.5-.3 5.5-1"></path>
      <path d="M12 10.5v3.5"></path>
      <path d="M9 20l3-6 3 6"></path>
    </g>
    
    </symbol>
  <symbol id="i-accept" viewBox="0 0 24 24">
    <g data-fill="outline" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 12.5l5 5L20 6.5"></path>
    </g>
    
    </symbol>
  <symbol id="i-cancel" viewBox="0 0 24 24">
    <!-- circular X to distinguish from plain Close -->
    <g data-fill="outline" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="9"></circle>
      <path d="M9 9l6 6"></path><path d="M15 9l-6 6"></path>
    </g>
    
    </symbol>
  <symbol id="i-close" viewBox="0 0 24 24">
    <g data-fill="outline" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M6 6l12 12"></path><path d="M18 6L6 18"></path>
    </g>
    
    </symbol>
  <symbol id="i-stopEditing" viewBox="0 0 24 24">
    <!-- pencil with a stop bar — leaves "edit mode" -->
    <g data-fill="outline" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14 3.5l5 5L10.5 17H6v-4.5L14 3.5Z"></path>
      <path d="M12.5 5l5 5"></path>
      <g class="danger" stroke="currentColor">
        <path d="M4 21l16-16" stroke-width="2"></path>
      </g>
    </g>
    
    </symbol>
</svg>