<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <symbol id="i-load" viewBox="0 0 24 24">
    <g data-fill="outline" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 7a1 1 0 0 1 1-1h5l2 2h8a1 1 0 0 1 1 1v3"></path>
      <path d="M3 9v9.5L5.6 11a1 1 0 0 1 .94-.66h14.13a1 1 0 0 1 .94 1.33L19.4 18a2 2 0 0 1-1.88 1.33H5"></path>
    </g>
    
    </symbol>
  <symbol id="i-save" viewBox="0 0 24 24">
    <g data-fill="outline" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
      <path d="M5 4h10l4 4v12a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V5a1 1 0 0 1 1-1Z"></path>
      <path d="M8 4v5h7"></path>
      <rect x="7" y="13" width="10" height="6" rx="1"></rect>
      <path d="M12 16h2"></path>
    </g>
    
    </symbol>
  <symbol id="i-import" viewBox="0 0 24 24">
    <!-- file with arrow going INTO it from outside -->
    <g data-fill="outline" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14 3H7a2 2 0 0 0-2 2v5"></path>
      <path d="M5 14v5a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8l-5-5Z"></path>
      <path d="M14 3v5h5"></path>
      <g class="accent" stroke="currentColor">
        <path d="M2 12h8"></path>
        <path d="M7 9l3 3-3 3"></path>
      </g>
    </g>
    
    </symbol>
  <symbol id="i-file" viewBox="0 0 24 24">
    <!-- generic document -->
    <g data-fill="outline" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
      <path d="M6 3h8l5 5v12a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1Z"></path>
      <path d="M14 3v5h5"></path>
      <path d="M8 13h8"></path><path d="M8 16h8"></path><path d="M8 19h5"></path>
    </g>
    
    </symbol>
  <symbol id="i-undo" viewBox="0 0 24 24">
    <g data-fill="outline" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 9h8a6 6 0 0 1 0 12H8"></path>
      <path d="M8 5L4 9l4 4"></path>
    </g>
    
    </symbol>
  <symbol id="i-redo" viewBox="0 0 24 24">
    <g data-fill="outline" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
      <path d="M20 9h-8a6 6 0 0 0 0 12h4"></path>
      <path d="M16 5l4 4-4 4"></path>
    </g>
    
    </symbol>
  <symbol id="i-editKey" viewBox="0 0 24 24">
    <!-- pencil drawing on a keycap -->
    <g data-fill="outline" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="13" width="11" height="8" rx="1.5"></rect>
      <path d="M16 3.5l4.5 4.5L13 15.5H8.5V11L16 3.5Z"></path>
      <path d="M14 5.5l4.5 4.5"></path>
    </g>
    
    </symbol>
  <symbol id="i-removeKey" viewBox="0 0 24 24">
    <!-- trash can with a tiny key (keycap) inside, explicit "remove KEY" -->
    <g data-fill="outline" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 7h16"></path>
      <path d="M9 7V5a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"></path>
      <path d="M6 7l1 12.5A1.5 1.5 0 0 0 8.5 21h7a1.5 1.5 0 0 0 1.5-1.5L18 7"></path>
      <rect x="9" y="11" width="6" height="6" rx="1"></rect>
      <path d="M11 14h2"></path>
    </g>
    
    </symbol>
  <symbol id="i-copy" viewBox="0 0 24 24">
    <g data-fill="outline" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
