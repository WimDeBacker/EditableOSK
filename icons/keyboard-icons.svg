      <path d="M16 8V5a1 1 0 0 0-1-1H5a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h3"></path>
    </g>
    
    </symbol>
  <symbol id="i-copyFormatting" viewBox="0 0 24 24">
    <!-- duplicated keycap (copy) + paintbrush stroke (formatting) -->
    <g data-fill="outline" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="10" height="10" rx="1.5"></rect>
      <path d="M9 13v2a1 1 0 0 0 1 1h6"></path>
      <path d="M16 13h4v4h-4z"></path>
      <path d="M18 17v1.5a2.5 2.5 0 0 1-5 0V17"></path>
      <circle cx="15.5" cy="20.5" r="0.6" fill="currentColor"></circle>
    </g>
    
    </symbol>
  <symbol id="i-addRow" viewBox="0 0 24 24">
    <!-- table + plus, on the seam between two rows -->
    <g data-fill="outline" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="5" width="18" height="14" rx="1"></rect>
      <path d="M3 12h6"></path><path d="M15 12h6"></path>
      <path d="M12 9v6"></path><path d="M9 12h6"></path>
    </g>
    
    </symbol>
  <symbol id="i-deleteRow" viewBox="0 0 24 24">
    <!-- table with a row crossed out (minus on highlighted row) -->
    <g data-fill="outline" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="4" width="18" height="16" rx="1"></rect>
      <path d="M3 9h18"></path><path d="M3 15h18"></path>
      <path d="M8 12h8"></path>
    </g>
    
    </symbol>
  <symbol id="i-insertRowAbove" viewBox="0 0 24 24">
    <!-- table with new row INSERTED at top; up arrow above pointing in -->
    <g data-fill="outline" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="9" width="18" height="11" rx="1"></rect>
      <path d="M3 13h18"></path><path d="M3 16h18"></path>
      <g class="accent" stroke="currentColor">
        <path d="M9 3h6"></path><path d="M12 0v6"></path>
      </g>
    </g>
    
    </symbol>
  <symbol id="i-insertRowBelow" viewBox="0 0 24 24">
    <g data-fill="outline" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="4" width="18" height="11" rx="1"></rect>
      <path d="M3 8h18"></path><path d="M3 11h18"></path>
      <g class="accent" stroke="currentColor">
        <path d="M9 21h6"></path><path d="M12 18v6"></path>
      </g>
    </g>
    
    </symbol>
  <symbol id="i-insertColLeft" viewBox="0 0 24 24">
    <g data-fill="outline" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
      <rect x="10" y="3" width="11" height="18" rx="1"></rect>
      <path d="M14 3v18"></path><path d="M17 3v18"></path>
      <g class="accent" stroke="currentColor">
        <path d="M1 12h6"></path><path d="M4 9v6"></path>
      </g>
    </g>
    
    </symbol>
  <symbol id="i-insertColRight" viewBox="0 0 24 24">
    <g data-fill="outline" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="11" height="18" rx="1"></rect>
      <path d="M7 3v18"></path><path d="M10 3v18"></path>
      <g class="accent" stroke="currentColor">
        <path d="M17 12h6"></path><path d="M20 9v6"></path>
      </g>
    </g>
    
    </symbol>
  <symbol id="i-mergeRight" viewBox="0 0 24 24">
    <!-- two cells, arrows colliding at the seam -->
    <g data-fill="outline" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="6" width="8" height="12" rx="1"></rect>
      <rect x="13" y="6" width="8" height="12" rx="1"></rect>
      <g class="accent" stroke="currentColor">
        <path d="M5 12h6"></path>
        <path d="M9 9l2 3-2 3"></path>
        <path d="M19 12h-6"></path>
        <path d="M15 9l-2 3 2 3"></path>
      </g>
    </g>
    
    </symbol>
  <symbol id="i-mergeDown" viewBox="0 0 24 24">
    <g data-fill="outline" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
      <rect x="6" y="3" width="12" height="8" rx="1"></rect>
      <rect x="6" y="13" width="12" height="8" rx="1"></rect>
      <g class="accent" stroke="currentColor">
        <path d="M12 5v6"></path>
        <path d="M9 9l3 2 3-2"></path>
        <path d="M12 19v-6"></path>
        <path d="M9 15l3-2 3 2"></path>
      </g>
    </g>
    
    </symbol>
  <symbol id="i-splitCell" viewBox="0 0 24 24">
    <!-- one big cell, dashed seam, outward arrows -->
    <g data-fill="outline" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="5" width="18" height="14" rx="1"></rect>
      <path d="M12 5v14" stroke-dasharray="2 2"></path>
      <g class="accent" stroke="currentColor">
        <path d="M10 12H3"></path><path d="M6 9l-3 3 3 3"></path>
        <path d="M14 12h7"></path><path d="M18 9l3 3-3 3"></path>
      </g>
    </g>
    
    </symbol>
  <symbol id="i-editKeyboard" viewBox="0 0 24 24">
    <!-- keyboard with a pencil overlay -->
    <g data-fill="outline" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2.5" y="7" width="14" height="11" rx="2"></rect>
      <path d="M5.5 11h.01"></path><path d="M9 11h.01"></path><path d="M12.5 11h.01"></path>
      <path d="M5.5 15h7"></path>
      <g class="accent" stroke="currentColor">
        <path d="M15 9l5-5 3 3-5 5h-3V9Z"></path>
        <path d="M18 6l3 3"></path>
      </g>
    </g>
    
    </symbol>
  <symbol id="i-keyboardSettings" viewBox="0 0 24 24">
