    <g data-fill="outline" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2.5" y="6" width="14" height="11" rx="2"></rect>
      <path d="M5.5 10h.01"></path><path d="M9 10h.01"></path><path d="M12.5 10h.01"></path>
      <path d="M5.5 14h7"></path>
      <g class="accent" stroke="currentColor">
        <circle cx="18" cy="17" r="3.3"></circle>
        <path d="M18 12v1.7"></path><path d="M18 20.3V22"></path>
        <path d="M13 17h1.7"></path><path d="M21.3 17H23"></path>
        <path d="M14.66 13.66l1.2 1.2"></path><path d="M20.14 19.14l1.2 1.2"></path>
        <path d="M21.34 13.66l-1.2 1.2"></path><path d="M15.86 19.14l-1.2 1.2"></path>
      </g>
    </g>
    
    </symbol>
  <symbol id="i-groups" viewBox="0 0 24 24">
